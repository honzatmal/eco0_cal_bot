name: Economic Calendar Bot

on:
  schedule:
    # 한국 시간 기준 오전 06:30 (UTC 21:30)
    - cron: '30 21 * * *'
    # 한국 시간 기준 오후 10:30 (UTC 13:30)
    - cron: '30 13 * * *'
  workflow_dispatch: # 필요 시 수동 실행 가능

# 전역 환경 변수 설정을 통해 Node.js 버전 경고를 차단합니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run_bot:
    # 최신 안정화된 Ubuntu 환경 사용
    runs-on: ubuntu-latest
    
    steps:
      # 코드 체크아웃 (최신 v4 사용)
      - name: Checkout
        uses: actions/checkout@v4

      # 파이썬 환경 설정 (v5 사용 및 최신 3.10 버전 지정)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 패키지 설치 속도 향상을 위한 캐싱 추가

      # 의존성 라이브러리 설치
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot requests beautifulsoup4

      # 스크립트 실행
      - name: Execute Script
        env:
          # GitHub Secrets에 등록된 변수명과 일치하는지 확인하세요.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
