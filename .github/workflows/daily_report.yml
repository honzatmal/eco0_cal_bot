name: Economic Calendar Bot (USD/EUR)

on:
  schedule:
    # 1. 아침 일정 알림: 한국 시간 06:30 (UTC 21:30)
    - cron: '30 21 * * *'
    # 2. 결과값 업데이트 알림: 한국 시간 22:30 (UTC 13:30) 
    # (주요 USD 지표 발표가 대개 21:30~22:30 사이에 몰려있음을 반영)
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install python-telegram-bot requests beautifulsoup4

      - name: Execute Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
