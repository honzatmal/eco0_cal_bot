name: Economic Calendar Bot (USD/EUR)

on:
  schedule:
    # 1. 아침 일정 알림 (KST 06:30)
    - cron: '30 21 * * *'
    # 2. 미국 주요지표 발표 후 실적 알림 (KST 22:30)
    - cron: '30 13 * * *'
    workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install python-telegram-bot requests beautifulsoup4

      - name: Execute Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
